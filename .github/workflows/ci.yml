name: C++ CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies (Google Test)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgtest-dev

      # 3️⃣ Build Google Test (IMPORTANT for Ubuntu)
      - name: Build Google Test
        run: |
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib

      # 4️⃣ Build your project (Release)
      - name: Build Project
        run: |
          make
          make install

      # 5️⃣ Run Tests
      - name: Run Tests
        run: make test
